server:
  port: 8091

spring:
  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher
  application:
    name: my-rest-api

  datasource:
    url: jdbc:mysql://${DB_HOST:111.228.9.124}:${DB_PORT:3306}/${DB_NAME:trading_plan}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai&characterEncoding=UTF-8
    username: ${DB_USERNAME:navicat_user}
    password: ${DB_PASSWORD:Panzer1234@}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 20000

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: false

  jackson:
    serialization:
      write-dates-as-timestamps: false
    date-format: yyyy-MM-dd HH:mm:ss
    default-property-inclusion: non_null

logging:
  level:
    com.example.myapi.service.TushareService: INFO
    root: INFO

tushare:
  token: ${TUSHARE_TOKEN:e054d234d3479bb5c6e7e1146c361d511a7cd9c8bb6de49d37b385c0}
  base-url: https://api.tushare.pro
  timeout: 30000

snapshot:
  retention-months: 3

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
