# ============================================
# 一体化 Docker Compose 配置
# 后端 + 前端 + Nginx 反向代理
# 单服务器部署方案
# ============================================

services:
  # -------------------------------------------
  # 后端 Spring Boot 服务
  # -------------------------------------------
  backend:
    build:
      context: .
      dockerfile: Dockerfile.optimized
    container_name: my-api-backend
    expose:
      - "8091"  # 仅内部暴露，不映射到宿主机
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT:-3306}
      - DB_NAME=${DB_NAME:-trading_plan}
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
      - TUSHARE_TOKEN=${TUSHARE_TOKEN}
      - TZ=Asia/Shanghai
      - JAVA_OPTS=-XX:+UseContainerSupport -XX:MaxRAMPercentage=75.0
    restart: always
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8091/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1'
        reservations:
          memory: 256M
          cpus: '0.5'
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"
    networks:
      - app-network

  # -------------------------------------------
  # 前端 React 应用 (Nginx)
  # -------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: my-api-frontend
    ports:
      - "80:80"  # 映射到宿主机端口 80
    restart: always
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.5'
        reservations:
          memory: 64M
          cpus: '0.25'
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"
    networks:
      - app-network
    depends_on:
      backend:
        condition: service_healthy

  # -------------------------------------------
  # 主 Nginx 反向代理 (可选)
  # 如果不想直接暴露前端容器端口，可以用这个
  # -------------------------------------------
  # nginx:
  #   image: nginx:alpine
  #   container_name: my-api-nginx
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./nginx-main.conf:/etc/nginx/nginx.conf:ro
  #     - ./ssl:/etc/nginx/ssl:ro
  #   depends_on:
  #     - frontend
  #     - backend
  #   restart: always
  #   networks:
  #     - app-network

networks:
  app-network:
    driver: bridge
